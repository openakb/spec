name: Specification question
description: A question about what the specification means or requires.
labels: ["question", "spec"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Quote the relevant part of the spec or schema if you can.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What you are building and why the answer matters.
    validations:
      required: false
