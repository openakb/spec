name: Links

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: links
  cancel-in-progress: true

jobs:
  external:
    name: External Links
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v7
      - name: Check Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config lychee.toml ."
          fail: false
