name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v7
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
      - name: Check Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--offline --config lychee.toml ."
          fail: true
      - name: Check Neutrality
        run: bash scripts/ci/check-neutrality.sh
      - name: Lint Workflows
        uses: docker://rhysd/actionlint:1.7.12

  schema:
    name: Schema Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v7
      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Validate Schema
        run: npm run check:schema
      - name: Check Conformance Manifest
        run: npm run check:conformance
      - name: Check Schema Sync
        run: bash scripts/ci/check-schema-sync.sh

  python:
    name: Python Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - name: Check Out
        uses: actions/checkout@v7
      - name: Install uv
        # Exact-pinned: upstream publishes no rolling `v8` major tag, unlike the
        # sibling actions above that are tracked by major version.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync Dependencies
        run: uv sync --locked
      - name: Check Formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy
      - name: Test And Run Conformance
        run: uv run pytest
      - name: Generate Conformance Report
        run: uv run python tests/conformance_report.py > conformance-report.json
      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check Conformance Report
        working-directory: .
        run: node scripts/ci/check-conformance-report.mjs packages/python/conformance-report.json
      - name: Upload Coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: packages/python/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: ${{ github.actor != 'dependabot[bot]' }}
      - name: Build Distributions
        run: uv build

  # `CI OK` is the single required status check for branch protection — do not rename casually.
  # Every new job added to this workflow MUST also be appended to this job's `needs:` to gate merges.
  ci-ok:
    name: CI OK
    needs: [docs, schema, python]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify Jobs
        run: 'if [ "${{ needs.docs.result }}" != "success" ] || [ "${{ needs.schema.result }}" != "success" ] || [ "${{ needs.python.result }}" != "success" ]; then echo "A required job did not succeed"; exit 1; fi'
