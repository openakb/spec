version: 2
updates:
  # Bump GitHub Actions major-version tags when a new major is released.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
  - package-ecosystem: "uv"
    directory: "/packages/python"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(python)"
  - package-ecosystem: "cargo"
    directory: "/packages/rust"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(rust)"
# npm ecosystem is added when its package lands in a later phase.
