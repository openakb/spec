version: 2
updates:
  # Bump GitHub Actions major-version tags when a new major is released.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
  - package-ecosystem: "uv"
    directory: "/packages/python"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(python)"
# Cargo / npm ecosystems are added when their packages land in later phases.
